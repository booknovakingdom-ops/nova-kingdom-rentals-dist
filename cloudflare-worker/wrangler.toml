name            = "estimate-delivery"
main            = "estimate-delivery.js"
compatibility_date = "2024-09-23"

# ── Route configuration ────────────────────────────────────────────────────────
#
# OPTION A — Domain on Cloudflare (recommended)
# Uncomment AFTER you have:
#   1. Added novakingdomrentals.com to your Cloudflare account
#   2. Enabled the Cloudflare proxy (orange cloud) on the A/CNAME record
#   3. Run: wrangler deploy
#
# [[routes]]
# pattern  = "novakingdomrentals.com/api/estimate-delivery"
# zone_name = "novakingdomrentals.com"
#
# OPTION B — Standalone workers.dev URL (no Cloudflare DNS required)
# Remove the [[routes]] block entirely and deploy with:
#   wrangler deploy
# Your worker will be live at:
#   https://estimate-delivery.<YOUR_ACCOUNT>.workers.dev
# Then update DELIVERY_API_URL in assets/quote-cart.mjs to that full URL.
#
# ── API key ───────────────────────────────────────────────────────────────────
#
# NEVER put the API key here.
# Set it once with:
#   wrangler secret put GOOGLE_MAPS_API_KEY
# Or via Cloudflare Dashboard → Workers & Pages → estimate-delivery
#          → Settings → Variables and Secrets → Add variable (encrypt it)
