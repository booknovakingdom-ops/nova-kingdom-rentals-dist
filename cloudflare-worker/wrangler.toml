name               = "nova-delivery-api"
main               = "estimate-delivery.js"
compatibility_date = "2024-09-23"

# Route — intercepts /api/estimate-delivery on the Cloudflare-proxied domain.
# novakingdomrentals.com must have orange-cloud (Proxied) DNS enabled.
[[routes]]
pattern   = "novakingdomrentals.com/api/estimate-delivery"
zone_name = "novakingdomrentals.com"

# ── API key ───────────────────────────────────────────────────────────────────
# GOOGLE_MAPS_API_KEY is already stored as a Worker secret in the dashboard.
# To rotate it later:  wrangler secret put GOOGLE_MAPS_API_KEY
