name: Deploy NK Contact Intake to Apps Script

on:
  push:
    branches:
      - main
    paths:
      - 'google-apps-script/nk-contact-intake.js'
      - 'google-apps-script/CoreBundle.gs'
      - 'google-apps-script/contact-intake-app/**'
      - '.github/workflows/deploy-contact-intake-apps-script.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: clasp push to Apps Script
    runs-on: ubuntu-latest

    env:
      CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
      CONTACT_INTAKE_SCRIPT_ID: ${{ secrets.CONTACT_INTAKE_SCRIPT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Validate required secrets are present
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "ERROR: CLASPRC_JSON secret is not set."
            echo "Add it in: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          if [ -z "$CONTACT_INTAKE_SCRIPT_ID" ]; then
            echo "ERROR: CONTACT_INTAKE_SCRIPT_ID secret is not set."
            echo "Find it in the Apps Script project: Project Settings → IDs → Script ID"
            exit 1
          fi

      - name: Write clasp credentials
        run: |
          printf '%s' "$CLASPRC_JSON" > ~/.clasprc.json
          chmod 600 ~/.clasprc.json

      - name: Write .clasp.json with script ID
        run: |
          printf '{\n  "scriptId": "%s",\n  "rootDir": "."\n}\n' \
            "$CONTACT_INTAKE_SCRIPT_ID" \
            > google-apps-script/contact-intake-app/.clasp.json

      - name: Copy canonical source files into deploy folder
        run: |
          cp google-apps-script/nk-contact-intake.js \
             google-apps-script/contact-intake-app/Code.gs

          cp google-apps-script/CoreBundle.gs \
             google-apps-script/contact-intake-app/CoreBundle.gs

          echo "Files staged for deploy:"
          ls -lh google-apps-script/contact-intake-app/

      - name: Guard against placeholder values in deploy files
        run: |
          BAD_PATTERNS="YOUR_CRM_SPREADSHEET_ID YOUR_ PASTE_ TODO_REPLACE"
          FAIL=0
          for FILE in \
            google-apps-script/contact-intake-app/Code.gs \
            google-apps-script/contact-intake-app/CoreBundle.gs; do
            for PAT in $BAD_PATTERNS; do
              if grep -q "$PAT" "$FILE"; then
                echo "ERROR: $FILE contains placeholder '$PAT' — deploy blocked."
                FAIL=1
              fi
            done
          done
          if [ "$FAIL" -eq 1 ]; then
            echo "Fix all placeholders in the canonical source files before deploying."
            exit 1
          fi
          echo "✅ No placeholder values detected in deploy files."

      - name: clasp status (verify project connection)
        working-directory: google-apps-script/contact-intake-app
        run: clasp status

      - name: clasp push
        working-directory: google-apps-script/contact-intake-app
        run: clasp push --force

      - name: Verify remote Apps Script — pull and grep deployed files
        working-directory: google-apps-script/contact-intake-app
        run: |
          # Pull the live remote into a fresh temp dir so we read what Apps Script
          # actually stored — not just what we pushed. This proves the deploy target
          # is the project we intended and the placeholder is gone.
          VERIFY_DIR=$(mktemp -d)
          printf '{"scriptId": "%s", "rootDir": "."}\n' "$CONTACT_INTAKE_SCRIPT_ID" \
            > "$VERIFY_DIR/.clasp.json"
          cd "$VERIFY_DIR"
          clasp pull

          echo ""
          echo "── Remote project info ─────────────────────────────────────────────"
          clasp status || true
          echo ""
          echo "── Files pulled from remote ────────────────────────────────────────"
          ls -lh
          echo ""

          # Confirm the correct spreadsheet ID is present in Code.gs
          echo "── SPREADSHEET_ID in remote Code.gs ────────────────────────────────"
          grep "SPREADSHEET_ID" Code.gs || echo "(not found)"

          # Fail if any placeholder token remains in the pulled remote files
          echo ""
          echo "── Placeholder check on remote files ───────────────────────────────"
          BAD_PATTERNS="YOUR_CRM_SPREADSHEET_ID YOUR_ PASTE_ TODO_REPLACE"
          FAIL=0
          for FILE in Code.gs CoreBundle.gs; do
            if [ ! -f "$FILE" ]; then
              echo "WARNING: $FILE not found in pulled remote — skipping"
              continue
            fi
            for PAT in $BAD_PATTERNS; do
              if grep -q "$PAT" "$FILE"; then
                echo "REMOTE FAIL: $FILE still contains '$PAT'"
                grep -n "$PAT" "$FILE"
                FAIL=1
              fi
            done
          done

          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "ERROR: Remote Apps Script project still contains placeholder values."
            echo "Check that CONTACT_INTAKE_SCRIPT_ID points to the correct project."
            echo "Script ID in use: $CONTACT_INTAKE_SCRIPT_ID"
            exit 1
          fi

          echo "✅ Remote Apps Script project verified — no placeholders found."

      - name: Deploy complete
        run: |
          echo "✅ NK Contact Intake deployed and verified."
          echo "   Remote Code.gs confirmed: no placeholder values."
          echo "   Run TestHarness.testAll() in the Apps Script editor to validate."
          echo ""
          echo "⚠  This deploy pushes code only."
          echo "   It does not run processContactIntake() and does not create Gmail drafts."
